apiVersion: v1
kind: Secret
metadata:
  name: dataagent-secrets
  namespace: dataagent
type: Opaque
stringData:
  # Base Database Secrets
  MSSQL_SA_PASSWORD: "S3cureP@ssword!123"
  REDIS_PASSWORD: "YourRedisSecret!"
  
  # MinIO
  MINIO_ROOT_USER: "admin"
  MINIO_ROOT_PASSWORD: "S3cureP@ssword!"
  
  # N8N
  N8N_AUTH_TOKEN: "my-secret-n8n-token"
  
  # Security
  CALLBACK_HMAC_SECRET: "SUPER_SECRET_HMAC_KEY_123456789012345"

  # Email
  SMTP_USERNAME: "your-email@gmail.com"
  SMTP_PASSWORD: "your-app-password"

  # Connection strings constructed from above
  DEFAULT_CONNECTION: "Server=dataagent-sqlserver,1433;Database=DataAgentDb;User Id=sa;Password=S3cureP@ssword!123;TrustServerCertificate=True;"
  HANGFIRE_CONNECTION: "Server=dataagent-sqlserver,1433;Database=DataAgentHangfireDb;User Id=sa;Password=S3cureP@ssword!123;TrustServerCertificate=True;"
  REDIS_CONNECTION: "dataagent-redis:6379,password=YourRedisSecret!"
