apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataagent-chart
  namespace: dataagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dataagent-chart
  template:
    metadata:
      labels:
        app: dataagent-chart
    spec:
      containers:
        - name: chart-service
          image: dataagent-chart:latest # Thay lại thành image thật
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: dataagent-config
            - secretRef:
                name: dataagent-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: dataagent-chart
  namespace: dataagent
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: dataagent-chart
