apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataagent-api
  namespace: dataagent
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: dataagent-api
  template:
    metadata:
      labels:
        app: dataagent-api
    spec:
      containers:
        - name: api
          image: dataagent-api:latest # Thay lại thành image thật trên registry
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: dataagent-config
            - secretRef:
                name: dataagent-secrets
          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: dataagent-secrets
                  key: DEFAULT_CONNECTION
            - name: ConnectionStrings__HangfireConnection
              valueFrom:
                secretKeyRef:
                  name: dataagent-secrets
                  key: HANGFIRE_CONNECTION
            - name: Redis__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: dataagent-secrets
                  key: REDIS_CONNECTION
            - name: MinIO__Endpoint
              valueFrom:
                configMapKeyRef:
                  name: dataagent-config
                  key: MINIO_ENDPOINT
            - name: MinIO__AccessKey
              valueFrom:
                secretKeyRef:
                  name: dataagent-secrets
                  key: MINIO_ROOT_USER
            - name: MinIO__SecretKey
              valueFrom:
                secretKeyRef:
                  name: dataagent-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: MinIO__UseSSL
              valueFrom:
                configMapKeyRef:
                  name: dataagent-config
                  key: MINIO_USE_SSL
            - name: N8N__WebhookUrl
              valueFrom:
                configMapKeyRef:
                  name: dataagent-config
                  key: N8N_WEBHOOK_URL
            - name: N8N__AuthToken
              valueFrom:
                secretKeyRef:
                  name: dataagent-secrets
                  key: N8N_AUTH_TOKEN
            - name: Analysis__CallbackHmacSecret
              valueFrom:
                secretKeyRef:
                  name: dataagent-secrets
                  key: CALLBACK_HMAC_SECRET
            - name: ChartService__BaseUrl
              valueFrom:
                configMapKeyRef:
                  name: dataagent-config
                  key: CHART_SERVICE_URL
            - name: Api__BaseUrl
              valueFrom:
                configMapKeyRef:
                  name: dataagent-config
                  key: API_BASE_URL
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: dataagent-api
  namespace: dataagent
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: dataagent-api
