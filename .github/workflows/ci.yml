name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-dotnet:
    name: Build & Test .NET API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Restore dependencies
        run: dotnet restore src/DataAgent.API/DataAgent.API.csproj
        
      - name: Build
        run: dotnet build src/DataAgent.API/DataAgent.API.csproj --no-restore --configuration Release
        
      # - name: Test
      #   run: dotnet test src/DataAgent.API/DataAgent.API.csproj --no-build --verbosity normal

  build-python:
    name: Build Chart Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        working-directory: ./src/chart-service
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Lint with flake8
        working-directory: ./src/chart-service
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  docker-build:
    name: Verify Docker Builds
    runs-on: ubuntu-latest
    needs: [build-dotnet, build-python]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build API Image
        run: docker build -t dataagent-api:test -f src/DataAgent.API/Dockerfile .
        
      - name: Build Chart Service Image
        run: docker build -t dataagent-chart:test -f src/chart-service/Dockerfile src/chart-service
