<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataAgent | Specific Job Tracking</title>
    <!-- Include SignalR Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    
    <!-- Load our new Vanilla JS Client -->
    <!-- Assuming you are running this file directly pointing back to the localhost:5196 -->
    <script src="http://localhost:5196/js/analysis-client.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 30px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 1rem;
            font-family: monospace;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }
        button {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background: #4f46e5; }
        
        .progress-container {
            height: 8px;
            background: #334155;
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            width: 0%;
            transition: width 0.8s ease-in-out;
        }
        .log-window {
            background: #000;
            border-radius: 8px;
            padding: 16px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #34d399;
            height: 200px;
            overflow-y: auto;
            border: 1px solid #334155;
            display: none;
        }
        .log-line { margin-bottom: 6px; }
        .log-time { color: #64748b; margin-right: 8px; }

        .status-badge {
            padding: 6px 16px;
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-block;
        }
        .status-Pending { background: #f59e0b20; color: #fbbf24; }
        .status-Processing { background: #3b82f620; color: #60a5fa; }
        .status-Succeeded { background: #10b98120; color: #34d399; }
        .status-Failed { background: #ef444420; color: #f87171; }
        .status-Unknown { background: #64748b20; color: #94a3b8; }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Track Specific Job</h1>
        
        <div class="card">
            <p style="margin-top: 0; color: #94a3b8;">Enter a Job ID to track its real-time progress from n8n:</p>
            <div class="input-group">
                <input type="text" id="job-id-input" placeholder="e.g. 123e4567-e89b-12d3...">
                <button onclick="startTracking()">Track Job</button>
            </div>
        </div>

        <div class="card" id="tracking-panel" style="opacity: 0.5; pointer-events: none;">
            <div class="job-header">
                <div>
                    <h3 style="margin: 0; display: inline-block;">Status</h3>
                    <span id="job-status" class="status-badge status-Unknown" style="margin-left: 15px;">WAITING</span>
                </div>
                <div id="result-link-container" style="display: none;">
                    <a href="#" id="result-link" target="_blank" style="color: #60a5fa; text-decoration: none; font-weight: 600;">📥 Download Result</a>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; font-size: 0.9rem; color: #cbd5e1; margin-bottom: 5px;">
                <span id="current-step">Waiting for updates...</span>
                <span id="progress-text">0%</span>
            </div>
            
            <div class="progress-container" id="progress-container" style="display: block;">
                <div class="progress-bar" id="job-progress-bar"></div>
            </div>

            <h4 style="margin: 25px 0 10px 0; color: #cbd5e1;">Execution Logs</h4>
            <div class="log-window" id="log-window" style="display: block;">
                <!-- Logs will appear here -->
            </div>
        </div>
    </div>

    <script>
        let client = null;

        function addLog(message) {
            const logWindow = document.getElementById('log-window');
            const time = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = 'log-line';
            logEntry.innerHTML = `<span class="log-time">[${time}]</span> ${message}`;
            logWindow.appendChild(logEntry);
            logWindow.scrollTop = logWindow.scrollHeight; // Auto-scroll to bottom
        }

        async function startTracking() {
            const jobId = document.getElementById('job-id-input').value.trim();
            if (!jobId) {
                alert("Please enter a valid Job ID");
                return;
            }

            // Enable tracking panel GUI
            document.getElementById('tracking-panel').style.opacity = '1';
            document.getElementById('tracking-panel').style.pointerEvents = 'auto';
            document.getElementById('log-window').innerHTML = ''; // clear previous logs
            addLog(`Connecting to signalR server and joining group for Job: ${jobId}...`);

            // Disconnect old job if any
            if (client) {
                await client.disconnectFromJob();
            }

            // Initialize new Client
            client = new window.AnalysisClient('http://localhost:5196/hubs/analysis');

            // 1. Listen for Overall Job Status Update (from Callbacks)
            client.onJobUpdate((update) => {
                const statusColors = {
                    0: { text: 'Pending', css: 'Pending' },
                    1: { text: 'Processing', css: 'Processing' },
                    2: { text: 'Succeeded', css: 'Succeeded' },
                    3: { text: 'Failed', css: 'Failed' }
                };

                const currentStatus = statusColors[update.status] || { text: 'Unknown', css: 'Unknown' };
                
                // Update badge
                const statusBadge = document.getElementById('job-status');
                statusBadge.innerText = currentStatus.text.toUpperCase();
                statusBadge.className = `status-badge status-${currentStatus.css}`;

                // Update text values
                document.getElementById('current-step').innerText = update.currentStep || update.message || `Status changed to ${currentStatus.text}`;
                document.getElementById('progress-text').innerText = `${update.progress}%`;
                
                // Update Progress bar width
                document.getElementById('job-progress-bar').style.width = `${update.progress}%`;

                // Add to log window
                addLog(`[STATUS] -> ${currentStatus.text.toUpperCase()} | Message: ${update.message || ''}`);

                // Show target URL if succeeded
                if (update.resultUrl) {
                    document.getElementById('result-link-container').style.display = 'block';
                    document.getElementById('result-link').href = update.resultUrl;
                }
            });

            // 2. Listen for Micro-progress actions (Optional: if you push events directly from Hangfire inside C#)
            client.onProgress((percent, message) => {
                document.getElementById('job-progress-bar').style.width = `${percent}%`;
                document.getElementById('progress-text').innerText = `${percent}%`;
                document.getElementById('current-step').innerText = message;
                addLog(`[PROGRESS - ${percent}%] -> ${message}`);
            });

            // Connect using the jobId given
            await client.connectToJob(jobId);
            addLog(`Successfully joined broadcast group for ${jobId}. Waiting for n8n payload...`);
        }
    </script>
</body>
</html>
