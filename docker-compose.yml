services:
  dataagent-api:
    build:
      context: .
      dockerfile: src/DataAgent.API/Dockerfile
    container_name: dataagent_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=DataAgentDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
      - ConnectionStrings__HangfireConnection=Server=sqlserver,1433;Database=DataAgentHangfireDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
      - Redis__ConnectionString=redis:6379,password=${REDIS_PASSWORD}
      - MinIO__Endpoint=minio:9000
      - MinIO__AccessKey=${MINIO_ROOT_USER}
      - MinIO__SecretKey=${MINIO_ROOT_PASSWORD}
      - MinIO__UseSSL=false
      - N8N__WebhookUrl=http://n8n:5678/webhook/analysis-trigger
      - N8N__AuthToken=${N8N_AUTH_TOKEN}
      - Analysis__CallbackHmacSecret=${CALLBACK_HMAC_SECRET}
      - ChartService__BaseUrl=http://chart-service:8000
      - Api__BaseUrl=http://dataagent-api:8080
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      setup-minio:
        condition: service_completed_successfully
    networks:
      - dataagent-network

  chart-service:
    build:
      context: src/chart-service
      dockerfile: Dockerfile
    container_name: chart_service
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=data-agent-reports
    ports:
      - "8000:8000"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - dataagent-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dataagent_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${MSSQL_SA_PASSWORD}\" -Q 'SELECT 1' -No || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - dataagent-network

  redis:
    image: redis:7-alpine
    container_name: dataagent_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dataagent-network

  minio:
    image: minio/minio:latest
    container_name: dataagent_minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dataagent-network

  # One-shot container to create the required MinIO bucket on first boot
  setup-minio:
    image: minio/mc:latest
    container_name: dataagent_setup_minio
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set myminio http://minio:9000 \"${MINIO_ROOT_USER}\" \"${MINIO_ROOT_PASSWORD}\"; mc mb --ignore-existing myminio/dataagent; mc anonymous set public myminio/dataagent; echo 'MinIO bucket setup complete!'; "
    networks:
      - dataagent-network

  n8n:
    image: n8nio/n8n:latest
    container_name: dataagent_n8n
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - dataagent-network

networks:
  dataagent-network:
    driver: bridge

volumes:
  sqlserver-data:
  redis-data:
  minio-data:
  n8n-data:
